<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In | GiftGenie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page-shell">
    <nav class="top-nav">
        <a href="/" class="brand">GiftGenie</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/signup">Sign Up</a>
        </div>
    </nav>

    <main class="container">
        <section class="glass-card">
            <p class="eyebrow">Welcome back</p>
            <h1>Log in to your gift vault</h1>
            <p class="subtitle">Save and revisit recommendations for different people.</p>

            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="testuser" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="password123" required>
                </div>

                <button type="submit" class="btn-primary">Log In</button>
            </form>

            <a href="/signup" class="btn-secondary">Create an Account</a>
        </section>
    </main>
</div>
</body>
</html>
